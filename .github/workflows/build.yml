name: Build Android

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: android32

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: AI-Level-Generator-Pro
          path: build/**/*.geode
