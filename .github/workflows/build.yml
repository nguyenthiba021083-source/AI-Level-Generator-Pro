name: Build Android

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Geode CLI
        run: |
          pip install geode-cli

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup NDK
        run: |
          sdkmanager "ndk;27.0.12077973"

      - name: Configure Geode
        run: |
          geode config set sdk.path $ANDROID_HOME
          geode config set ndk.path $ANDROID_HOME/ndk/27.0.12077973

      - name: Build Mod
        run: |
          geode build -p android

      - name: Upload Build
        uses: actions/upload-artifact@v4
        with:
          name: Android-Build
          path: build/**/*.geode
