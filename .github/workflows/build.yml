name: Build Android

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Geode CLI
        run: |
          curl -fsSL https://cli.geode-sdk.org/install.sh | bash

      - name: Build
        run: |
          geode build android
