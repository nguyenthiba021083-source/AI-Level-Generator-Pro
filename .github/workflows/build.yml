name: Build Geode Mod

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main

      - name: Upload Mod
        uses: actions/upload-artifact@v4
        with:
          name: AI-Level-Generator-Pro
          path: build/**/*.geode
