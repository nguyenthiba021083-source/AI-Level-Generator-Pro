name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Geode Mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: android32

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: geode-build
          path: build/**/*.geode
