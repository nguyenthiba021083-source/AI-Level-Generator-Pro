name: Build Android

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: geode-sdk/build-geode-mod@main

      - uses: actions/upload-artifact@v4
        with:
          name: geode-build
          path: build/**/*.geode
