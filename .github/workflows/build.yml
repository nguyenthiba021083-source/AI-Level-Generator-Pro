name: Build Android

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Geode CLI
        run: |
          pip install git+https://github.com/geode-sdk/cli

      - name: Verify Geode
        run: |
          geode --version

      - name: Build
        run: |
          geode build -p android

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: AI-Level-Generator-Pro
          path: build/**/*.geode
